    <script>
    // Handle SPA routing from GitHub Pages 404 redirect
    (function() {
      var path = window.location.search.match(/[?&]\/([^&]*)/);
      if (path) {
        var newPath = path[1] || '';
        var search = window.location.search.replace(/[?&]\/[^&]*/, '').replace(/^[?&]/, '');
        history.replaceState(null, null, window.location.pathname + newPath + (search ? '?' + search : '') + window.location.hash);
      }
    })();
  </script>
