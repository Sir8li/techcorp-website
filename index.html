    <script>
    // Handle SPA routing from GitHub Pages 404 redirect
    // 404.html redirects /services/embedded-systems to /?/services/embedded-systems
    (function() {
      var search = window.location.search;
      // Match /?/path or &/path pattern
      var match = search.match(/[?&]\/?([^&]*)/);
      if (match && match[1]) {
        var redirectPath = '/' + match[1];
        // Clean up the search string
        var cleanSearch = search.replace(/[?&]\/?[^&]*/, '').replace(/^&/, '?');
        var newUrl = window.location.pathname + redirectPath + cleanSearch + window.location.hash;
        window.history.replaceState(null, null, newUrl);
        // Force React Router to recognize the new path
        window.dispatchEvent(new PopStateEvent('popstate', { state: null }));
      }
    })();
    </script>
  </body>
