<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TechCore | Embedded Solutions</title>
  <script>
    // Single Page Apps for GitHub Pages
    // Redirect all paths to index.html for client-side routing
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, function() { return '%26'; }) : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
